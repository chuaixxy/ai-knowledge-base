name: V4 Daily AI Knowledge Collection

# 每天 UTC 00:00（北京时间 08:00）自动采集
# 和 V2 的 workflow 错开 8 小时，避免同时 commit
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: v4

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: v4/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify pipeline entrypoint
        run: |
          test -f pipeline/pipeline.ts
          test -f workflows/graph.ts
          test -f package.json

      - name: Run V4 pipeline (LangGraph collect + analyze + review + organize)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: deepseek-chat
          LLM_DEBUG: ${{ vars.LLM_DEBUG || '0' }}
          PLANNER_TARGET_COUNT: "10"
          BUDGET_YUAN: "1.0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --no-publish: CI 只采集入库，飞书推送由本地 cron / OpenClaw 负责
          npx tsx pipeline/pipeline.ts --no-publish

      - name: Validate collected articles
        run: |
          if ls knowledge/articles/*.json 1>/dev/null 2>&1; then
            npx tsx hooks/validate-json.ts knowledge/articles/*.json
            npx tsx hooks/check-quality.ts knowledge/articles/*.json
          else
            echo "No articles to validate"
          fi
        continue-on-error: true

      - name: Show summary
        run: |
          echo "========== V4 采集结果 =========="
          find knowledge/articles -maxdepth 1 -name "*.json" ! -name "index.json" | wc -l
          echo "最近 5 个新文件:"
          ls -t knowledge/articles/*.json 2>/dev/null | grep -v index.json | head -5
          echo "================================"

      - name: Commit and push results
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add v4/knowledge/
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            COUNT=$(find v4/knowledge/articles -maxdepth 1 -name "*.json" ! -name "index.json" | wc -l | tr -d " ")
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(v4): daily collection - ${COUNT} articles [${DATE}]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              sleep 5
            done
          fi
