name: Daily Collect

on:
  schedule:
    - cron: '0 8 * * *'   # UTC 08:00 = 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix v2

      - name: Verify pipeline entrypoint
        run: |
          test -f v2/pipeline/pipeline.ts
          test -f v2/package.json

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_DEBUG: ${{ vars.LLM_DEBUG || '0' }}
        run: npx --prefix v2 tsx v2/pipeline/pipeline.ts --sources github,rss --limit 5 --total-limit 25 --verbose

      - name: Validate collected articles
        run: |
          if ls v2/knowledge/articles/*.json 1>/dev/null 2>&1; then
            npx --prefix v2 tsx v2/hooks/validate-json.ts v2/knowledge/articles/*.json
            npx --prefix v2 tsx v2/hooks/check-quality.ts v2/knowledge/articles/*.json
          else
            echo "No articles to validate"
          fi
        continue-on-error: true

      - name: Commit and push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/knowledge/
          if git diff --staged --quiet; then
            echo "没有新数据，跳过提交"
          else
            COUNT=$(find v2/knowledge/articles -maxdepth 1 -name "*.json" ! -name "index.json" | wc -l | tr -d " ")
            DATE=$(date +%Y-%m-%d)
            git commit -m "collect: ${COUNT} articles (${DATE})"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              sleep 5
            done
          fi
