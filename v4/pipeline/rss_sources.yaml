# pipeline/rss_sources.yaml
#
# 知识库 RSS 数据源配置
#
# 字段说明：
#   name     - 可读名称，用于日志展示
#   url      - RSS / Atom 订阅地址
#   category - 分类：general / research / industry / open-source / framework / news / chinese-tech / chinese
#   enabled  - true 启用采集，false 跳过
#   limit    - 该源每次最多采集条数；未设置时回退到全局 --limit

sources:

  # --- 综合技术 ---

  - name:     "Hacker News (Best)"
    url:      "https://hnrss.org/best?q=AI+OR+LLM+OR+agent"
    category: "general"
    enabled:  true
    limit:    5           # 带关键词过滤，质量较高

  - name:     "Lobsters (AI/ML)"
    url:      "https://lobste.rs/t/ai,ml.rss"
    category: "general"
    enabled:  true
    limit:    3

  # --- AI 研究 ---

  - name:     "arXiv cs.AI"
    url:      "https://rss.arxiv.org/rss/cs.AI"
    category: "research"
    enabled:  true
    limit:    3

  - name:     "arXiv cs.CL"
    url:      "https://rss.arxiv.org/rss/cs.CL"
    category: "research"
    enabled:  false       # 量太大，按需开启
    limit:    3

  - name:     "Reddit r/MachineLearning"
    url:      "https://www.reddit.com/r/MachineLearning/hot.rss"
    category: "research"
    enabled:  true
    limit:    3

  # --- 公司博客 ---

  - name:     "OpenAI Blog"
    url:      "https://openai.com/blog/rss.xml"
    category: "industry"
    enabled:  true
    limit:    3

  - name:     "Anthropic Research"
    url:      "https://www.anthropic.com/research/rss.xml"
    category: "industry"
    enabled:  false       # 404，Anthropic 暂无公开 RSS，待确认
    limit:    3

  - name:     "Google AI Blog"
    url:      "https://blog.google/technology/ai/rss/"
    category: "industry"
    enabled:  true
    limit:    3

  # --- 开源社区 ---

  - name:     "Hugging Face Blog"
    url:      "https://huggingface.co/blog/feed.xml"
    category: "open-source"
    enabled:  true
    limit:    5

  - name:     "Reddit r/LocalLLaMA"
    url:      "https://www.reddit.com/r/LocalLLaMA/hot.rss"
    category: "open-source"
    enabled:  true
    limit:    3

  # --- 框架 ---

  - name:     "LangChain Blog"
    url:      "https://blog.langchain.dev/rss/"
    category: "framework"
    enabled:  true
    limit:    2

  # --- 科技媒体 ---

  - name:     "The Verge (AI)"
    url:      "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    category: "news"
    enabled:  true
    limit:    3

